<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Generator</title>
</head>
<body>
  <header class="app-header">
    <h1 class="scenario-title">
      <span id="scenarioName">Dungeon generator — version 0.1: rooms</span>
      <span id="scenarioNarrative">Generate a map, then add narrative.</span>
    </h1>
  </header>

  <main class="app-shell">
    <section id="canvas-wrap" class="canvas-wrap">
      <svg id="canvas"></svg>
    </section>

    <aside class="settings-sidebar">
      <div class="sidebar-actions">
        <button id="genBtn" class="primary">Generate</button>
        <button id="addNarrativeBtn">Add narrative</button>
      </div>

      <label class="field">
        <span>Narrative engine</span>
        <select id="llmProviderSelect">
          <option value="local" selected>Local Ollama</option>
          <option value="api">Groq API</option>
        </select>
      </label>
      
      <label class="field">
        <span>Seed</span>
        <div class="seed-row">
          <input id="seedInput" />
          <label class="random-toggle">
            <input id="randomSeedCheck" type="checkbox" checked/>
            Random
          </label>
        </div>
      </label>

      <label class="field">
        <span>Size</span>
        <select id="sizeSelect">
          <option value="small">Small (3–6 rooms)</option>
          <option value="medium" selected>Medium (6–12 rooms)</option>
          <option value="large">Large (12–25 rooms)</option>
        </select>
      </label>

      <label class="field">
        <span>Linearity: <b id="breakVal">30</b>%</span>
        <input id="breakRange" type="range" min="0" max="80" value="30" />
      </label>

      <label class="field">
        <span>Rectangular: <b id="rectPctVal">60</b>%</span>
        <input id="rectPctRange" type="range" min="0" max="100" value="60" />
      </label>

      <label class="field">
        <span>Circular: <b id="circlePctVal">20</b>%</span>
        <input id="circlePctRange" type="range" min="0" max="100" value="20" />
      </label>

      <label class="field">
        <span>Octagonal: <b id="octagonPctVal">20</b>%</span>
        <input id="octagonPctRange" type="range" min="0" max="100" value="20" />
      </label>

      <label class="field">
        <span>Accent color: <b id="accentPctVal">15</b>%</span>
        <input id="accentPctRange" type="range" min="0" max="100" value="15" />
      </label>

      <div class="stats">
        <div>Rooms: <span id="statRooms">—</span></div>
        <div>Target: <span id="statTarget">—</span></div>
        <div>Depth: <span id="statDepth">—</span></div>
        <div>Seed: <span id="statSeed">—</span></div>
      </div>

      <section id="narrativePanel" class="narrative-panel"></section>
    </aside>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
